introduction:
- A list of C# Source Generators (not necessarily awesome), because I haven't found a good list yet.
- ''
- '**C# Source Generators** is a Roslyn compiler feature introduced in C#9/.NET 5. It lets C# developers inspect user code
  and generate new C# source files that can be added to a compilation.'
- ''
- Add GitHub topic [`csharp-sourcegenerator`](https://github.com/topics/csharp-sourcegenerator) to your generator repo - let's
  get it started!
documentation:
- '[docs.microsoft.com](https://docs.microsoft.com/en-us/dotnet/csharp/roslyn-sdk/source-generators-overview) official documentation.'
- '[dotnet/roslyn feature design document](https://github.com/dotnet/roslyn/blob/main/docs/features/source-generators.md)
  describing the compiler feature.'
- '[dotnet/roslyn cookbook](https://github.com/dotnet/roslyn/blob/main/docs/features/source-generators.cookbook.md) to help
  with generator creation.'
- '[dotnet/roslyn-sdk samples](https://github.com/dotnet/roslyn-sdk/tree/main/samples/CSharp/SourceGenerators) show how to
  implement a source generator and use features like external package references (*inside* generators). Includes AutoNotify,
  Csv, Maths, Mustache, and SettingsXml.'
- '[SourceGeneratorPlayground](https://wengier.com/SourceGeneratorPlayground) - an online Source Generator Playground to play
  with generator ideas 💡 without any setup noise. [Source repo](https://github.com/davidwengier/SourceGeneratorPlayground).'
- '[davidwengier/SourceGeneratorTemplate](https://github.com/davidwengier/SourceGeneratorTemplate) -![stars](https://img.shields.io/github/stars/davidwengier/SourceGeneratorTemplate?style=flat-square&cacheSeconds=604800)
  ![last commit](https://img.shields.io/github/last-commit/davidwengier/SourceGeneratorTemplate?style=flat-square&cacheSeconds=86400)
  A basic template for writing a C# source generator, from the Roslyn dev.'
categories:
  dependency-injection-ioc-container:
    name: Dependency Injection (IoC Container)
    repositories:
    - name: AutoCtor
      url: https://github.com/distantcam/AutoCtor
      description: AutoCtor is a Roslyn Source Generator that will automatically create a constructor for your class for use
        with constructor Dependency Injection.
    - name: AutoRegisterInject
      url: https://github.com/patrickklaeren/AutoRegisterInject
      description: Automatically generate Microsoft Dependency Injection ServiceCollection registrations for your classes
        from attributes.
    - name: CircleDI
      url: https://github.com/BlackWhiteYoshi/CircleDI
      description: The world only full-power circular Service Provider. It can resolve circular dependencies, has compile
        time safety and optimal performance.
    - name: DependencyInjection.SourceGenerators
      url: https://github.com/jimmy-mll/DependencyInjection.SourceGenerators
      description: This project is a C# source generator designed to simplify and automate the registration of dependencies
        in Microsoft's Dependency Injection service collection. By using this package, developers can enhance the clarity
        and efficiency of their code by reducing the need for manual service registration.
    - name: DependencyManagement
      url: https://github.com/essy-ecosystem/dependency-management
      description: The Dependency Management is a very fast dependency injection and components container, with many interesting
        features, and without reflection.
    - name: GrpcInjection
      url: https://github.com/juniorporfirio/grpcinjection
      description: GrpcInjection is a tool  that allow you to inject Services and Interceptor in time of compilation inside
        of GRPC Projects using C# source generator.
    - name: Injectio
      url: https://github.com/loresoft/Injectio
      description: Source generator that helps register discovered services in the dependency injection container
    - name: Jab
      url: https://github.com/pakrym/jab
      description: Compile Time Dependency Injection
    - name: lambdajection
      url: https://github.com/cythral/lambdajection
      description: Framework for building AWS Lambdas using dependency injection and aspect-oriented programming.
    - name: MrMeeseeks.DIE
      url: https://github.com/Yeah69/MrMeeseeks.DIE
      description: An unambigous, convenient, flexible and feature rich compile time dependency injection container.
    - name: Pure.DI
      url: https://github.com/DevTeam/Pure.DI
      description: dependency injection for .NET without any IoC/DI containers, frameworks, dependencies, and thus without
        any performance impact and side-effects.
    - name: ServiceScan.SourceGenerator
      url: https://github.com/Dreamescaper/ServiceScan.SourceGenerator
      description: Type scanning source generator for `Microsoft.Extensions.DependencyInjection` services registrations inspired
        by [Scrutor](https://github.com/khellang/Scrutor/).
    - name: SourceDepend
      url: https://github.com/crwsolutions/sourcedepend
      description: Simply tag members with a `[Dependency]` attribute and those will be added to the constructor, saving you
        from manual coding the constructor.
    - name: SourceInject
      url: https://github.com/giggio/sourceinject/
      description: A source generator that allow you to generate your services for dependencies injection during compile time.
    - name: StrongInject
      url: https://github.com/YairHalberstadt/stronginject
      description: compile time dependency injection for .NET.
    - name: Thunderboltloc
      url: https://github.com/AlyElhaddad/ThunderboltIoc
      description: One of the very first IoC frameworks for .Net that has no reflection.
  console--cli:
    name: Console / CLI
    repositories:
    - name: AutoSpectre
      url: https://github.com/jeppevammenkristensen/auto-spectre
      description: Generates a service for prompting and populating a class using the Spectre.Console library
    - name: ConsoleAppFramework
      url: https://github.com/Cysharp/ConsoleAppFramework
      description: Zero Dependency, Zero Overhead, Zero Reflection, Zero Allocation, AOT Safe CLI Framework powered by C#
        Source Generator.
    - name: docopt.net
      url: https://github.com/docopt/docopt.net
      description: generates C# source code that parses command-line arguments into a strong-typed arguments class (also generated),
        given _just_ the [POSIX-style usage in plain text](http://docopt.org/) as part of the CLI. In other words, write the
        help message for your program and get the entire parser generated for free!
    - name: Figgle
      url: https://github.com/drewnoakes/figgle
      description: Generate ASCII banner text at compile time (or run time) using figlet fonts.
  mappers:
    name: Mappers
    repositories:
    - name: AutoDto
      url: https://github.com/Ohorodnikov/AutoDto
      description: A source generator that generates DTO models from BL to avoid same BL and DTO models
    - name: Facet
      url: https://github.com/Tim-Maes/Facet/
      description: A source generator that instantly scaffolds DTOs, ViewModels and typed LINQ projections.
    - name: Flattening
      url: https://github.com/Kros-sk/Kros.Generators.Flattening
      description: C# source generator for generating flattened classes from complex domain classes.
    - name: GraphQL.Tools
      url: https://github.com/MoienTajik/GraphQL.Tools
      description: A GraphQL to C# compiler (code-generator) which turns your GraphQL schema into a set of C# classes, interfaces,
        and enums.
    - name: Mapperly
      url: https://github.com/riok/mapperly
      description: A source generator for generating object mappings. Inspired by MapStruct.
    - name: MappingCloningExtensions
      url: https://github.com/musictopia2/MappingCloningExtensions
      description: Generates extensions of objects for mapping and cloning using either attributes or fluent style.  Also,
        supports deep copying and specfiying whether it can do a deep copy and the possibility of doing so safely.
    - name: Mapster
      url: https://github.com/MapsterMapper/Mapster
      description: A fast, fun and performant object to object Mapper. Has better performance and is more memorry efficient
        than Automapper. Besides code generation, supports also Fluent API.
    - name: MapTo
      url: https://github.com/mrtaikandi/MapTo
      description: A convention based object to object mapper similar to Automapper.
    - name: NextGenMapper
      url: https://github.com/DedAnton/NextGenMapper
      description: Easy-to-use mapper without configuration.
    - name: SourceMapper
      url: https://github.com/alekshura/SourceMapper
      description: generates Mappers code based on attributes used on interfaces or abstract classes. It is inspired by Java
        [MapStruct](https://mapstruct.org/)
    - name: SourceMapper
      url: https://github.com/paiden/SourceMapper/
      description: A source generator that creates extension methods for cloning and mapping.
  communication:
    name: Communication
    repositories:
    - name: CoreWCF
      url: https://github.com/CoreWCF/CoreWCF
      description: CoreWCF provides support of WCF server side code on .NET Core / .NET6. CoreWCF allows users to inject services
        into `OperationContract` implementation using a source generator to provide an `OperationContract` implementation
        that fits the expected `ServiceContract`. The supplied implementation fetch services from the DI container the same
        way the `[FromServices]` attribute works in ASP.NET core MVC Controllers. The source generator supports both a dedicated
        `[Injected]` attribute and the ASP.NET Core MVC `[FromServices]` attribute.
    - name: Imp.NET
      url: https://github.com/DouglasDwyer/Imp.NET
      description: a fast, high-level, object-oriented C# networking library that supports the invocation of remote methods
        through proxy interface objects.
    - name: IoTHubClientGenerator
      url: https://github.com/alonf/IoTHubClientGenerator
      description: Build a C# Azure IoT Device client program in seconds!
  graphics--drawing:
    name: Graphics / Drawing
    repositories:
    - name: ComputeSharp
      url: https://github.com/Sergio0694/ComputeSharp
      description: A .NET library to run C# code in parallel on the GPU through DX12 and dynamically generated HLSL compute
        shaders, which are transpiled from C# and precompiled at build-time using source generators.
    - name: Svg to C# Source Generators
      url: https://github.com/wieslawsoltes/Svg.Skia
      description: SVGC compiles SVG drawing markup to C# using SkiaSharp as rendering engine. SVGC can be also used as codegen
        for upcoming C# 9 Source Generator feature.
  enums:
    name: Enums
    repositories:
    - name: BetterEnums
      url: https://github.com/Ceiridge/BetterEnums
      description: C# Enums with values and better performance as a source generator
    - name: Credfeto.Enumeration.Source.Generation
      url: https://github.com/credfeto/credfeto-enum-source-generation
      description: Enum to text generator for enums - generates strongly typed enums for all enums in the assembly, and using
        `EnumText` attribute for third party enums.  Also includes an analyzer to ensure that all enum usages use the `.GetName`
        extension method rather than `.ToString`.
    - name: Enum.Source.Generator
      url: https://github.com/EngRajabi/Enum.Source.Generator
      description: A C# source generator to create an enumeration (enum) class from an enum type. With this package, you can
        work on enums very, very fast without using reflection.
    - name: EnumClass
      url: https://github.com/ashenBlade/EnumClass
      description: Generate Kotlin's `enum class` from C# `enum` with additional features like Switch function (instead of
        `switch` statement). It also contains support libraries like generator for JsonConverter for generated classes
    - name: EnumerationClassGenerator
      url: https://github.com/HamedFathi/EnumerationClassGenerator
      description: A C# source generator to create an enumeration class from an enum type.
    - name: EnumFastToStringDotNet
      url: https://github.com/Spinnernicholas/EnumFastToStringDotNet
      description: Automatically generates enum extension methods that implement a switch expression based ToString method.
    - name: EnumUtilitiesGenerator
      url: https://github.com/leoformaggi/enum-utilities-generator
      description: A source generator to generate compile-time mapping of enums and description attributes.
    - name: FastEnumGenerator
      url: https://github.com/musictopia2/FastEnumGenerator
      description: An enum like generator where you create a partial class with private enum and it will generate an enum
        like record struct even including returning the words and a list.
    - name: JOS.Enumeration
      url: https://github.com/joseftw/jos.enumeration
      description: Enumeration class powered by source generation
    - name: NetEscapades.EnumGenerators
      url: https://github.com/andrewlock/NetEscapades.EnumGenerators
      description: A source generator for generating fast "reflection" methods for enums
    - name: RapidEnum
      url: https://github.com/hanachiru/RapidEnum
      description: RapidEnum is a Source Generator that provides fast-running enum utilities for C#/.NET. It is faster than
        the .NET API and achieves zero allocation for all methods.
  functional-programming:
    name: Functional Programming
    repositories: []
    subcategories:
      value-semantic--new-type-idiom:
        name: Value semantic / New Type Idiom
        repositories:
        - name: ComparisonOperatorsGenerator
          url: https://github.com/sonnemaf/ReflectionIT.ComparisonOperatorsGenerator
          description: A Source Generator package that generates the `>`, `>=`, `<`, `<=` operators for a `partial` type (`class`,
            `struct` or `record`) which implements `IComparable<T>`.
        - name: Generator.Equals
          url: https://github.com/diegofrata/Generator.Equals
          description: generates equality and hashing for classes and records, supports a number of strategies for comparing
            collections and properties.
        - name: RSCG_UtilityTypes
          url: https://github.com/ignatandrei/RSCG_UtilityTypes
          description: Add Omit and Pick attributes to generate classes from existing class, like in TypeScript.
        - name: Strongly
          url: https://github.com/lucasteles/Strongly
          description: Easily generate serializable domain value types
        - name: StronglyTypedId
          url: https://github.com/andrewlock/StronglyTypedId
          description: A Rosyln-powered generator for strongly-typed IDs
        - name: ValueObjectGenerator
          url: https://github.com/RyotaMurohoshi/ValueObjectGenerator
          description: C# source generator is for ValueObjects (ie.Wrapper classes).
        - name: Vogen
          url: https://github.com/SteveDunn/Vogen
          description: C# source generator and code analyser that generates strongly typed domain identities.
        - name: WrapperValueObject
          url: https://github.com/martinothamar/WrapperValueObject
          description: for creating simple value objects wrapping primitive types.
      immutability:
        name: Immutability
        repositories:
        - name: Immutype
          url: https://github.com/DevTeam/Immutype
          description: generates extension methods to support immutability.
        - name: Visor
          url: https://github.com/leviysoft/Visor
          description: C# optics library with incremental code generator (maintained fork of [suspended Tinkoff project](https://github.com/Tinkoff/Visor))
      discriminated-unions:
        name: Discriminated Unions
        repositories:
        - name: AnyOf
          url: https://github.com/StefH/AnyOf
          description: The Source Generator creates a `AnyOf<First, TSecond, ...>` type to handle multiple defined types as
            input parameters for methods.
        - name: dotVariant
          url: https://github.com/mknejp/dotvariant
          description: A type-safe and space-efficient sum type for C# (comparable to discriminated unions in C or C++).
        - name: Dunet
          url: https://github.com/domn1995/dunet
          description: A simple source generator for [discriminated unions](https://en.wikipedia.org/wiki/Tagged_union) in
            C#.
        - name: Funcky Discriminated Unions
          url: https://github.com/polyadic/funcky-discriminated-union
          description: A source generator that generates `Match` methods for all your discriminated unions needs. ✨ Can be
            used with or without the functional programming library Funcky.
        - name: N.SourceGenerators.UnionTypes
          url: https://github.com/Ne4to/N.SourceGenerators.UnionTypes
          description: Discriminated union type source generator.
        - name: Unions
          url: https://github.com/PaulBraetz/Unions
          description: for generating meaningful, efficient union types.
  serialization:
    name: Serialization
    repositories:
    - name: AutoDeconstructable
      url: https://github.com/nemesissoft/Nemesis.TextParsers/tree/master/Nemesis.TextParsers.CodeGen/Deconstructable
      description: Generator for efficient and automatic flat text serializer/deserializer using [Deconstructable aspect](https://github.com/nemesissoft/Nemesis.TextParsers/blob/master/Specification.md#deconstructables)
        in [NTP](https://github.com/nemesissoft/Nemesis.TextParsers) library.
    - name: Azura
      url: https://github.com/Lucina/Azura
      description: Generates binary [de]serializers on Streams at design time.
    - name: Csv-CSharp
      url: https://github.com/nuskey8/Csv-CSharp
      description: Csv-CSharp is a highly performant CSV (TSV) parser for .NET and Unity. It is designed to parse UTF-8 binaries
        directly and leverage Source Generators to enable serialization/deserialization between CSV (TSV) and object arrays
        with zero (or very low) allocation.
    - name: CSV-Parser-Generator
      url: https://github.com/LokiMidgard/CSV-Parser-Generator
      description: A Parser for CSV with support for uncommon line separators (e.g. Unicode) and instantiation of read-only
        objects and working nullable handling.
    - name: GenPack
      url: https://github.com/dimohy/GenPack
      description: is a library that uses the .NET source generator to automatically generate packets as classes once you
        define a schema for the packets. It's easy to use and the results are useful.
    - name: MemoryPack
      url: https://github.com/Cysharp/MemoryPack
      description: Zero encoding extreme performance binary serializer for C# and Unity.
    - name: MessagePack for C#
      url: https://github.com/MessagePack-CSharp/MessagePack-CSharp
      description: Extremely Fast MessagePack Serializer for C#(.NET, .NET Core, Unity, Xamarin). / msgpack.org[C#]
    - name: ProtobufSourceGenerator
      url: https://github.com/ladeak/ProtobufSourceGenerator
      description: A source generator that generates partial helper classes where member properties are attributed with ProtoMember
        attribute.
    - name: protobuf-net
      url: https://github.com/protobuf-net/protobuf-net
      description: protobuf-net is a contract based serializer for .NET code, that happens to write data in the "protocol
        buffers" serialization format engineered by Google.
    - name: SerdeDn (serde-sn)
      url: https://github.com/agocke/serde-dn
      description: is a port of the popular [serde.rs](https://serde.rs/) Rust serialization/deserialization library to .NET.
        Basic cases are fully automated using a C# source generator.
    - name: SpreadCheetah
      url: https://github.com/sveinungf/spreadcheetah
      description: Create Excel files with a C# Source Generator for generating the rows.
    - name: StackXML
      url: https://github.com/ZingBallyhoo/StackXML
      description: Stack based zero-allocation XML serializer and deserializer.
    - name: StructPacker
      url: https://github.com/RudolfKurka/StructPacker
      description: binary serializer that auto-generates C# serialization code to achieve peak runtime performance and efficiency.
    - name: Tinyhand
      url: https://github.com/archi-Doc/Tinyhand
      description: Tiny and simple data format/serializer using a source generator.
    - name: VYaml
      url: https://github.com/hadashiA/VYaml
      description: VYaml is a pure C# YAML 1.2 implementation, which is extra fast, low memory footprint with focued on .NET
        and Unity.
    subcategories:
      json:
        name: Json
        repositories:
        - name: GeneratedJsonConverters
          url: https://github.com/aviationexam/json-converter-source-generator
          description: generate json converters for polymorph contracts and string based enum serialization.
        - name: JsonByExampleGenerator
          url: https://github.com/hermanussen/JsonByExampleGenerator
          description: generate classes based on example json files in your project.
        - name: JsonDeserializeResourceSourceGenerator
          url: https://github.com/musictopia2/JsonDeserializeResourceSourceGenerator
          description: Instead of having to do embedded resource, can instead have json as additional file and it will produce
            a c# string and will deserialize to a type specified.
        - name: JsonPolymorphicGenerator
          url: https://github.com/surgicalcoder/JsonPolymorphicGenerator
          description: Source Code Generator for System.Text.Json JsonDerivedType attributes on polymorphic classes
        - name: JsonSerializerContextGenerator
          url: https://github.com/musictopia2/JsonSerializerContextGenerator
          description: A source generator that produces nearly the same code as system.json.text but easier to use because
            you only have to put an attribute for a model class you want to produce for.  Also, produces a method to register
            to make it easy to use that source generator when serializing/deserializing json.
        - name: JsonSrcGen
          url: https://github.com/trampster/JsonSrcGen
          description: compile time JSON serializer generation.
        - name: TeuJson
          url: https://github.com/Terria-K/TeuJson
          description: A Reflection-less and Lightweight Json Library using source generator.
  validation:
    name: Validation
    repositories:
    - name: EasyValidate
      url: https://github.com/mu-dawood/EasyValidate
      description: High-performance, type-safe .NET source generator that uses attributes to automatically generate validation
        for properties, fields, and method parameters. Easy Validate supports async validation, integrates with dependency
        injection, and includes rich analyzers and code fixers for a seamless developer experience.
    - name: Validly
      url: https://github.com/Hookyns/validly
      description: A performant, zero-allocation, and highly customizable validation library that generates validation logic
        based on attributes, with usage similar to DataAnnotations.
  localization:
    name: Localization
    repositories:
    - name: kli.Localize
      url: https://github.com/kl1mm/localize
      description: localize strings from json files via  source code generation
    - name: MrMeeseeks.ResXToViewModelGenerator
      url: https://github.com/Yeah69/MrMeeseeks.ResXToViewModelGenerator
      description: Takes ResX files and generates localization ViewModels for a more convenient usage of localization in MVVM
        projects.
    - name: ResXGenerator
      url: https://github.com/ycanardeau/ResXGenerator
      description: Generates strongly-typed resource classes for looking up localized strings.
  testing:
    name: Testing
    repositories:
    - name: Buildenator
      url: https://github.com/progala2/Buildenator
      description: Generate data builder classes for testing purposes (and not only) for your entities. Autofixture + Moq
        extensions.
    - name: FluentAssertions.Eventual
      url: https://github.com/mazharenko/FluentAssertions.Eventual
      description: Generates a specialized waiting wrapper for `FluentAssertions` assertions, offering a syntax similar to
        plain `FluentAssertions`.
    - name: ScenarioTests
      url: https://github.com/koenbeuk/ScenarioTests
      description: Test your code like you would write a notebook. Simply and effective
    subcategories:
      mocking:
        name: Mocking
        repositories:
        - name: GRPC-Mock-Server
          url: https://github.com/cezarypiatek/GRPC-Mock-Server
          description: A source generator for stubbing GRPC services.
        - name: InterfaceGenerator
          url: https://github.com/daver32/InterfaceGenerator
          description: Auto generate interface definition by implementation, for when you need an abstraction for the sake
            of mocking.
        - name: MockableStaticGenerator
          url: https://github.com/HamedFathi/MockableStaticGenerator
          description: A C# source generator to make an interface and a class wrapper to test static/extension methods.
        - name: MockGen
          url: https://github.com/thomas-girotto/MockGen
          description: A C# mocking library based on source generators.
        - name: MockSourceGenerator
          url: https://github.com/hermanussen/MockSourceGenerator
          description: A C# mocking library that generates mocks at compile-time using a source generator.
        - name: ProxyInterfaceGenerator
          url: https://github.com/StefH/ProxyInterfaceSourceGenerator
          description: generate an interface and a Proxy class for classes. This makes it possible to wrap external classes
            which do not have an interface, in a Proxy class which makes it easier to Mock and use DI.
        - name: Rocks
          url: https://github.com/JasonBock/Rocks
          description: A mocking library based on the Compiler APIs (Roslyn + Mocks).
  patterns:
    name: Patterns
    repositories:
    - name: ActorSrcGen
      url: https://github.com/aabs/ActorSrcGen
      description: Generates boilerplate to turn simple C# classes into TPL Dataflow compatible pipelines with robust and
        performant asynchronous and concurrent code.
    - name: InlineComposition
      url: https://github.com/BlackWhiteYoshi/InlineComposition
      description: A source generator that merges the content of other classes into one class. A simple workaround for struct
        inheritance or multiple inheritance.
    - name: JinShil.MixinSourceGenerator
      url: https://github.com/JinShil/JinShil.MixinSourceGenerator
      description: A simple, but powerful source generator that implements the mixin design pattern by copying members—along
        with their attributes and XML documentation comments—verbatim from one or more source classes/structs into anaother,
        forming a composition of said classes/structs.
    - name: Lombok.NET
      url: https://github.com/CollinAlpert/Lombok.NET
      description: Generates boilerplate code and common code patterns. As the name suggests, it is the .NET version of Java's
        Lombok.
    - name: Minerals.AutoMixins
      url: https://github.com/SzymonHalucha/Minerals.AutoMixins
      description: Package for automatic mixin design pattern generation using an incremental source generator.
    - name: Minerals.AutoCQRS
      url: https://github.com/SzymonHalucha/Minerals.AutoCQRS
      description: NuGet package that provides interfaces for implementing the CQRS pattern (Commands, Queries, and Pipelines)
        along with automatic dependency injection and no MediatR package overhead.
    subcategories:
      mediator:
        name: Mediator
        repositories:
        - name: DumplingsDevs.Pipelines
          url: https://github.com/DumplingsDevs/Pipelines
          description: The most flexible mediation implementation in the .NET ecosystem with your own types.
        - name: Foundatio Mediator
          url: https://github.com/FoundatioFx/Foundatio.Mediator
          description: Blazingly fast, convention-based C# mediator powered by source generators and interceptors.
        - name: Immediate.Handlers
          url: https://github.com/immediateplatform/Immediate.Handlers
          description: An implementation of the Mediator pattern in .NET using source generators, without using a central
            mediator instance.
        - name: Mediator
          url: https://github.com/martinothamar/Mediator
          description: a high performance implementation of Mediator pattern in .NET using source generators.
        - name: MediatR controllers generator
          url: https://github.com/Burgyn/MMLib.MediatR.Generators
          description: This generator generates controllers and their methods based on your [MediatR](https://github.com/jbogard/MediatR)
            requests.
      command:
        name: Command
        repositories:
        - name: Plastic
          url: https://github.com/sang-hyeon/Plastic
          description: This project provides encapsulation of things like Domain, Application Rules, Business Rules or Business
            Logic in Application.
      builder:
        name: Builder
        repositories:
