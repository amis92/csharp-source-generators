meta:
- name: AttributeFactoryGenerator
  url: https://github.com/PaulBraetz/AttributeFactoryGenerator
  description: Generate factories to easily parse actual attribute instances from symbol data.
- name: AttributesSourceGeneratorHelper
  url: https://github.com/musictopia2/AttributesSourceGeneratorHelper
  description: A source generator to help another generator by producing attributes.  Anything that inherits from Attribute
    will be sent to the client so you don't have to build strings for attributes.
- name: CommonSourceGeneratorsHelpers
  url: https://github.com/musictopia2/CommonSourceGeneratorsHelpers
  description: A generator to create many helpers for source generators to use to make up that its very difficult to reference
    third party libraries in source generators including extensions and a source code string builder.
- name: HotReload
  url: https://github.com/andrzejolszak/BuilderGeneratorHotReload
  description: A simple hack to enable hot reload in Visual Studio Intellisense when developing a source generator project
    together with an example dependent client project inside a single solution.
- name: SourceGeneratorUtils
  url: https://github.com/thenameless314159/SourceGeneratorUtils
  description: An essential library equipped with utility functions and helpers to aid in writing source files for source
    generators or for general purposes. Based on the `System.Text.Json` source generator architecture for best-practices.
- name: SourceGenerator.Helper.CopyCode
  url: https://github.com/LokiMidgard/SourceGenerator.Helper.CopyCode
  description: A simple Generator that generates a string representation to an annotated Type.
articles:
- '[Title](URL) (YYYY-MM-DD) short description.'
- '[Series: Creating a source generator](https://andrewlock.net/series/creating-a-source-generator/) (2022-02-01) Complete
  series about how to create an incremental source generator, using the APIs introduced in .NET 6.'
- '[Mastering at Source Generators](https://medium.com/c-sharp-progarmming/mastering-at-source-generators-18125a5f3fca) (2022-01-15)
  Generating CRUD controller from DTO model using text template.'
- '[Using C# Source Generators to create an external DSL](https://devblogs.microsoft.com/dotnet/using-c-source-generators-to-create-an-external-dsl/)
  (2021-01-27) that shows how to implement a simple DSL.'
- '[4 ways to generate code in C# — Including Source Generators in .NET 5](https://levelup.gitconnected.com/four-ways-to-generate-code-in-c-including-source-generators-in-net-5-9e6817db425)
  (2021-01-19) demonstrates the comparison between Source Generators, T4 template and Reflection, etc.'
- '[.NET 5 Source Generators - MediatR - CQRS - OMG!](https://www.edument.se/en/blog/post/net-5-source-generators-mediatr-cqrs)
  (2020-12-16) explores how source generators can be used to automatically generate an API for a system using the MediatR
  library and the CQRS pattern.'
- '[Source Generators in .NET 5 with ReSharper](https://blog.jetbrains.com/dotnet/2020/11/12/source-generators-in-net-5-with-resharper/)
  (2020-11-20) introduces source generators and briefly mentions how they are being worked into the ReSharper product.'
- '[Source Generators - real world example](https://dominikjeske.github.io/source-generators) (2020-11-09) contains a rich
  and deep dive into a real world generator with lots of useful tips.'
- '[How to profile C# 9.0 Source Generators](https://jaylee.org/archive/2020/10/10/profiling-csharp-9-source-generators.html)
  (2020-10-10) demonstrates how to profile your source generator using the [performance profiling tools built into Visual
  Studio](https://docs.microsoft.com/en-us/visualstudio/profiling/?view=vs-2019).'
- '[How to Debug C# 9 Source Code Generators](https://nicksnettravels.builttoroam.com/debug-code-gen/) (2020-10-09) contains
  debugging tips.'
- '[How to generate code using Roslyn source generators in real world scenarios](https://www.cazzulino.com/source-generators.html)
  (2020-09-17) rich story of how ThisAssembly generator was written using Scriban templates.'
- '[.NET Blog ''New C# Source Generator Samples'' post](https://devblogs.microsoft.com/dotnet/new-c-source-generator-samples/)
  (2020-08-25) that shows some simple samples.'
- '[.NET Blog ''Introducing C# Source Generators'' post](https://devblogs.microsoft.com/dotnet/introducing-c-source-generators/)
  (2020-04-29) that announces the feature.'
videos:
- '[Title](URL) (YYYY-MM-DD) short description.'
- '[C# Source Generators - Write code that writes code - David Wengier](https://www.youtube.com/watch?v=pqLs7X6Cr6s) (2020-11-13)
  Roslyn dev takes deep dive into the topic.'
- '[.NET Languages and Runtime Community Standup - Source Generators](https://www.youtube.com/watch?v=A4479Etdx4I) (2020-10-08)
  shows how Generators work and how they can be tested.'
- '[Channel 9 ''Source Generators in C#''](https://channel9.msdn.com/Shows/Visual-Studio-Toolbox/Source-Generators-in-CSharp)
  (2020-08-12) has Roslyn PMs discussing the feature.'
demo_projects:
- name: Compile Time Method Execution Generator
  url: https://github.com/hermanussen/CompileTimeMethodExecutionGenerator
  description: proof of concept that allows executing a method during compilation, so that it can be really fast during runtime.
