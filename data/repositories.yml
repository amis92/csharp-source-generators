tips_and_tricks: "Collection of tips and tricks (simple and brief to fit in Tweet):\n\n[Tweeted](https://twitter.com/raboof/status/1397296571801288704)\
  \ by [@raboof](https://twitter.com/raboof) on May 25 2021 at 23:00:\n\n> TIL to debug a source generator in VS 16.10: upgrade\
  \ [Microsoft.CodeAnalysis.CSharp to 3.10.\\*](https://www.nuget.org/packages/Microsoft.CodeAnalysis.CSharp/3.10.0-3.final),\
  \ add `<IsRoslynComponent>true</IsRoslynComponent>` to source generator project, select **Roslyn Component** for **Launch**\
  \ in **Project Properties Debug** page, choose **Target** then <kbd>F5</kbd> :rocket:\n>\n> ![Source Generator debugger](https://docs.microsoft.com/en-us/visualstudio/releases/2019/media/16.10/16.10_p2_source_generators_debugger.png)\n\
  \n[Tweeted](https://twitter.com/raboof/status/1328426892882550784) by [@raboof](https://twitter.com/raboof) on Nov 16 2020\
  \ at 20:57:\n\n> See files emitted by [#SourceGenerators] by adding these properties to your (*.csproj) project file:\n\
  >\n> ```xml\n> <EmitCompilerGeneratedFiles>true</EmitCompilerGeneratedFiles>\n> <CompilerGeneratedFilesOutputPath>$(BaseIntermediateOutputPath)Generated</CompilerGeneratedFilesOutputPath>\n\
  > ```\n\n[Tweeted](https://twitter.com/Chiser99/status/1301198611158499328) by [@Chiser99](https://twitter.com/Chiser99)\
  \ on Sep 02 2020 at 06:41:\n\n> I made a thing: https://github.com/chsienki/Kittitas\n>\n> If you're building Roslyn Source\
  \ Generators or Analyzers check it out, it makes debugging them inside the compiler easier. #roslyn #csharp #dotnetcore\
  \ #sourcegenerators #analyzers\n\nBuild failed in WPF projects [microsoft/CsWin32#7](https://github.com/microsoft/CsWin32/issues/7):\n\
  \n> If your build failed in a *_wpftmp.csproj file you need to add following property to your (*.csproj) project file:\n\
  > ```xml\n> <IncludePackageReferencesDuringMarkupCompilation>true</IncludePackageReferencesDuringMarkupCompilation>\n> ```\n\
  >\n> and use at least .NET 5.0.102 SDK\n\n  [#SourceGenerators]: https://twitter.com/hashtag/SourceGenerators?src=hashtag_click\n\
  \  [#sourcegenerators]: https://twitter.com/hashtag/sourcegenerators?src=hashtag_click\n  [#roslyn]: https://twitter.com/hashtag/roslyn?src=hashtag_click\n\
  \  [#csharp]: https://twitter.com/hashtag/csharp?src=hashtag_click\n  [#dotnetcore]: https://twitter.com/hashtag/dotnetcore?src=hashtag_click\n\
  \  [#analyzers]: https://twitter.com/hashtag/analyzers?src=hashtag_click\n\nReference local projects or embed NuGet packages\
  \ to source generator assemblies [dotnet/roslyn#47517](https://github.com/dotnet/roslyn/discussions/47517#discussioncomment-64145):\n\
  \n⚠ Please be aware that this may result in crashes, when another generator or SDK component loads such an assembly with\
  \ lower version. If you can, please avoid embedding additional DLLs/packages.\n\n> You can add a dependency to a source\
  \ generator in the same solution through three steps:\n> \n> 1. Add a `<PackageReference>`, making sure to set both `GeneratePathProperty=\"\
  true\"` and `PrivateAssets=\"all\"`\n> 2. Add a build target to add `<TargetPathWithTargetPlatformMoniker>` elements as\
  \ part of GetTargetPath, and add all the required dependency assemblies inside this target, making sure to set `IncludeRuntimeDependency=\"\
  false\"`\n> 3. Update `<GetTargetPathDependsOn>` to ensure the target from the previous step is used\n> \n> You can see\
  \ an example of these steps here:\n> https://github.com/dotnet/roslyn-sdk/blob/0313c80ed950ac4f4eef11bb2e1c6d1009b328c4/samples/CSharp/SourceGenerators/SourceGeneratorSamples/SourceGeneratorSamples.csproj#L13-L30"
